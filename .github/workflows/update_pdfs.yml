name: Daily PDF Crawler

on:
  schedule:
    - cron: '0 19 * * *' # 매일 한국시간 새벽 4시 (UTC 19:00)에 자동 실행
  workflow_dispatch: # 관리자가 원할 때 버튼을 눌러서 수동 실행 가능

permissions:
  contents: write # 봇이 다운받은 PDF를 깃허브에 저장할 수 있도록 허락

jobs:
  crawl-and-save:
    runs-on: ubuntu-22.04
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 준비물(Playwright) 설치하기
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: 🚀 크롤링 봇 실행 (15개 PDF 다운로드)
        run: python generate_pdfs.py

      - name: 💾 다운받은 PDF를 깃허브에 저장 (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add pdfs/
          # 새로운 메뉴판으로 바뀌었을 때만 저장하고, 똑같으면 넘어갑니다.
          git commit -m "🤖 메뉴판 PDF 최신화 완료" || echo "변경된 파일이 없습니다."
          git push
